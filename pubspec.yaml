name: prism
description: Program Registry for Intern and Student Management - Offline-First Timeclock & Reporter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Database (Offline-first)
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Device Native Features
  geolocator: ^10.1.0
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  
  # PDF Generation
  pdf: ^3.10.4
  printing: ^5.11.0
  
  # UI & Design System
  google_fonts: ^6.1.0
  material_symbols_icons: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # Extracted typography for Civic Horizon Design System
  fonts:
    - family: Public Sans
      fonts:
        - asset: fonts/PublicSans-Regular.ttf
        - asset: fonts/PublicSans-Bold.ttf
          weight: 700
        - asset: fonts/PublicSans-Black.ttf
          weight: 900
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
