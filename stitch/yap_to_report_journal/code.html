<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yap-to-Report Journal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#005227",
                        "tertiary-fixed": "#83fba5",
                        "surface-tint": "#4b53bc",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#00006e",
                        "on-background": "#191c1d",
                        "outline-variant": "#c6c5d5",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "inverse-primary": "#bfc2ff",
                        "on-primary-fixed-variant": "#3239a3",
                        "secondary-fixed": "#e0e0ff",
                        "surface-container-high": "#e7e8e9",
                        "on-surface-variant": "#464653",
                        "surface-container-low": "#f3f4f5",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#179d53",
                        "surface-container-highest": "#e1e3e4",
                        "on-secondary-fixed-variant": "#41436c",
                        "on-secondary-fixed": "#15173d",
                        "on-surface": "#191c1d",
                        "secondary-container": "#cccefe",
                        "primary-fixed": "#e0e0ff",
                        "on-secondary-container": "#545680",
                        "primary-container": "#000080",
                        "surface-bright": "#f8f9fa",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#777eea",
                        "inverse-surface": "#2e3132",
                        "background": "#f8f9fa",
                        "secondary": "#585b85",
                        "outline": "#767684",
                        "surface": "#f8f9fa",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary": "#ffffff",
                        "primary": "#00003c",
                        "secondary-fixed-dim": "#c1c3f3",
                        "tertiary": "#000e03",
                        "primary-fixed-dim": "#bfc2ff",
                        "surface-container": "#edeeef",
                        "tertiary-container": "#002810",
                        "tertiary-fixed-dim": "#66dd8b",
                        "on-tertiary-fixed": "#00210c",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb"
                    },
                    fontFamily: {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .header-anchor {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/85 backdrop-blur-md">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-blue-900 hover:bg-slate-200/50 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-xl font-black uppercase tracking-tighter text-blue-900 font-['Public_Sans']">PRISM</h1>
</div>
<div class="flex items-center gap-4">
<div class="text-right hidden md:block">
<p class="text-xs font-bold text-blue-900">Journal</p>
<p class="text-[10px] text-slate-500 uppercase tracking-widest">Active Session</p>
</div>
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden border border-outline-variant/20">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="professional studio portrait of a government official in a dark suit with a neutral grey background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsDlMtW1bnAf3RFDa5wmDYOuwhCNiJlU9C1ESgr5LCGeXsn0r1-vx9ZR_TRQQzr45P-U3ERCe-22ND8iiNZNae2QRbsL7cUy_pxf6m4irhvv4i3mqw3im-Pfe3YXnLi93AItL2wKvDV3txxwIxc73YqTOeOxhU-OeYkHS9UaV2jZR2TRoqKZb832PG3mRPMCeXQhBVGh8hrjDBcBexRNtj6-FQdxupXTdpGGQC4RdE256mItS3mS08IjF4PtQRigzZQVXxzVMkYtg"/>
</div>
</div>
</div>
<div class="bg-slate-200/50 h-[1px] w-full"></div>
</header>
<main class="pt-24 px-4 max-w-4xl mx-auto space-y-6">
<!-- Calendar/Date Picker Section -->
<section class="flex items-center justify-between bg-surface-container-low p-4 rounded-xl">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-on-primary">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div>
<p class="text-xs font-semibold text-on-surface-variant uppercase tracking-tighter">Selected Date</p>
<p class="text-lg font-bold text-primary font-headline">October 24, 2023</p>
</div>
</div>
<button class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-highest text-on-surface font-semibold text-sm hover:bg-white transition-colors">
<span>Change</span>
<span class="material-symbols-outlined text-sm" data-icon="expand_more">expand_more</span>
</button>
</section>
<!-- Informal Daily Notes Input -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-6">
<section class="md:col-span-12 space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Daily Transcript / Informal Notes</label>
<div class="relative group">
<textarea class="w-full min-h-[320px] p-6 rounded-xl bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary text-on-surface font-body leading-relaxed shadow-sm transition-all resize-none placeholder:text-slate-400" placeholder="Type your informal daily notes here..."></textarea>
<div class="absolute bottom-4 right-4 flex gap-2">
<span class="px-3 py-1 bg-surface-container-high rounded-full text-[10px] font-bold text-on-surface-variant uppercase">Draft Saved</span>
</div>
</div>
</section>
<!-- Action Button -->
<div class="md:col-span-12 flex justify-center py-4">
<button class="group relative inline-flex items-center justify-center px-10 py-5 font-bold text-white transition-all duration-200 bg-gradient-to-br from-primary to-primary-container rounded-xl hover:shadow-xl active:scale-95">
<span class="material-symbols-outlined mr-3" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-headline tracking-tight text-lg">Generate Formal Report</span>
</button>
</div>
<!-- Formal Output Card -->
<section class="md:col-span-12">
<div class="bg-surface-container-highest rounded-2xl overflow-hidden shadow-inner border border-outline-variant/10">
<div class="px-6 py-4 flex items-center justify-between bg-primary/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="description">description</span>
<h2 class="font-headline font-bold text-primary">Formal Output</h2>
</div>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white text-primary border border-primary/10 hover:bg-primary hover:text-white transition-all text-xs font-bold">
<span class="material-symbols-outlined text-sm" data-icon="content_copy">content_copy</span>
<span>Copy text</span>
</button>
</div>
<div class="p-8 min-h-[240px] bg-white m-4 rounded-xl">
<div class="space-y-4 text-on-surface-variant font-body leading-relaxed text-sm">
<p class="border-l-4 border-primary-container pl-4 italic text-slate-400">Formal report will be synthesized here based on your informal notes above...</p>
<div class="h-4 bg-slate-50 rounded w-3/4 animate-pulse"></div>
<div class="h-4 bg-slate-50 rounded w-1/2 animate-pulse"></div>
<div class="h-4 bg-slate-50 rounded w-5/6 animate-pulse"></div>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-1.5 hover:text-blue-700 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-100/80 text-blue-900 rounded-xl px-5 py-1.5 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase">Journal</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-1.5 hover:text-blue-700 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase">Reports</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-1.5 hover:text-blue-700 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase">Settings</span>
</a>
</nav>
</body></html>
