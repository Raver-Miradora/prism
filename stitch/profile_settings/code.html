<div class="space-y-1 institutional-slide-in" style="animation-delay: 0.1s;">
<span class="text-xs font-bold tracking-[0.2em] text-on-surface-variant uppercase font-label">Registry Profile</span>
<h2 class="text-4xl font-black text-primary font-headline tracking-tight">Settings</h2>
</div>
<!-- Profile Information Section -->
<section class="space-y-6 institutional-slide-in" style="animation-delay: 0.2s;">
<div class="bg-surface-container-low rounded-xl p-8 space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Text Inputs -->
<div class="space-y-6 md:col-span-2">
<div class="relative">
<label class="block text-xs font-bold text-on-surface-variant mb-2 uppercase tracking-wider font-label">Intern Full Name</label>
<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant/30 focus:border-primary focus:ring-0 px-0 py-3 text-lg font-medium transition-colors placeholder-on-surface-variant/40" type="text" value="Alexander Thorne"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="relative">
<label class="block text-xs font-bold text-on-surface-variant mb-2 uppercase tracking-wider font-label">Government Agency/Office</label>
<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant/30 focus:border-primary focus:ring-0 px-0 py-3 text-on-surface transition-colors" type="text" value="Department of Information Technology"/>

<div class="relative">

<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant/30 focus:border-primary focus:ring-0 px-0 py-3 text-on-surface transition-colors" type="text" value="Dr. Elena Rodriguez"/>
</div>
</div>
</div>
<!-- Numeric Inputs -->
<div class="relative">
<label class="block text-xs font-bold text-on-surface-variant mb-2 uppercase tracking-wider font-label">Total Target Hours</label>
<div class="flex items-center bg-surface-container-high border-b-2 border-outline-variant/30 px-4 focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="schedule">schedule</span>
<input class="w-full bg-transparent border-0 focus:ring-0 py-3 text-on-surface font-semibold" type="number" value="486"/>
</div>
</div>
<div class="relative">
<label class="block text-xs font-bold text-on-surface-variant mb-2 uppercase tracking-wider font-label">Expected Time In</label>
<div class="flex items-center bg-surface-container-high border-b-2 border-outline-variant/30 px-4 focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="alarm">alarm</span>
<input class="w-full bg-transparent border-0 focus:ring-0 py-3 text-on-surface font-semibold" type="text" value="08:00 AM"/>
</div>
</div>
</div>
</div>
</section>

<div class="flex items-center gap-4 mb-6">

<div>

</button>
<button class="flex items-center justify-center gap-2 px-6 py-4 rounded-lg border-2 border-outline-variant hover:bg-surface-container-high transition-all active:scale-95 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="settings_backup_restore">settings_backup_restore</span>
<span class="font-bold text-on-surface-variant group-hover:text-primary font-label uppercase tracking-wide text-xs">Restore Database</span>
